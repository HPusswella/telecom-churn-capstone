<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Churn Prediction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
            display: none;
        }
        .churn-yes {
            background-color: #ffcccc;
            color: #cc0000;
            border: 1px solid #cc0000;
        }
        .churn-no {
            background-color: #d4edda;
            color: #105c22;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Churn Prediction System</h2>
    
    <div class="form-group">
        <label>Tenure (Months):</label>
        <input type="number" id="Tenure Months" placeholder="e.g. 12" required>
    </div>

    <div class="form-group">
        <label>Monthly Charges ($):</label>
        <input type="number" id="Monthly Charges" placeholder="e.g. 65.50" required>
    </div>

    <div class="form-group">
        <label>Contract Type:</label>
        <select id="Contract">
            <option value="Month-to-month">Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
        </select>
    </div>

    <div class="form-group">
        <label>Internet Service:</label>
        <select id="Internet Service">
            <option value="Fiber optic">Fiber optic</option>
            <option value="DSL">DSL</option>
            <option value="No">No</option>
        </select>
    </div>

    <button onclick="makePrediction()">Predict Churn</button>

    <div id="result"></div>
</div>

<script>
    async function makePrediction() {
        const data = {
            "Tenure": parseFloat(document.getElementById('Tenure Months').value),
            "MonthlyCharges": parseFloat(document.getElementById('Monthly Charges').value),
            "Contract": document.getElementById('Contract').value,
            "InternetService": document.getElementById('Internet Service').value
        };

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "Predicting...";
        resultDiv.className = ""; 

        try {
            // Backend api ekata data yawanawa (Port 5000)
            const response = await fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.prediction) {
                resultDiv.innerHTML = result.prediction;
                if (result.prediction.includes("Yes")) {
                    resultDiv.classList.add("churn-yes");
                } else {
                    resultDiv.classList.add("churn-no");
                }
            } else {
                resultDiv.innerHTML = "Error: " + result.error;
            }

        } catch (error) {
            resultDiv.innerHTML = "Error connecting to backend server. Is app.py running?";
        }
    }
</script>

</body>
</html>
